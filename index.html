<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercado · CriptoDash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
  /* ── PALETTES ── */
  :root {
    --bg:        #FAF7F0;
    --panel:     #FFFFFF;
    --ink:       #1A1814;
    --ink-dim:   #6B6358;
    --ink-soft:  #A39989;
    --rule:      rgba(26,24,20,0.08);
    --rule-str:  rgba(26,24,20,0.18);
    --up:        #1F7A4D;
    --up-soft:   #E8F2EC;
    --down:      #B23A2A;
    --down-soft: #F5E7E3;
    --warm:      #C96442;
    --font:      'Space Grotesk', -apple-system, system-ui, sans-serif;
    --serif:     'Instrument Serif', Georgia, serif;
    --mono:      'JetBrains Mono', ui-monospace, monospace;
  }
  html.dark {
    --bg:        #1A1814;
    --panel:     #23201B;
    --ink:       #FAF7F0;
    --ink-dim:   #A39989;
    --ink-soft:  #6B6358;
    --rule:      rgba(250,247,240,0.10);
    --rule-str:  rgba(250,247,240,0.25);
    --up:        #5FCF92;
    --up-soft:   rgba(95,207,146,0.14);
    --down:      #F08374;
    --down-soft: rgba(240,131,116,0.14);
    --warm:      #E8825C;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background .25s, color .25s;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 56px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
    transition: background .25s;
  }
  .logo-group {
    display: flex; align-items: baseline; gap: 12px;
    cursor: pointer; background: none; border: none; color: var(--ink);
    padding: 0;
  }
  .logo-text {
    font-family: var(--serif); font-size: 28px; font-style: italic;
    line-height: 1; color: var(--ink); letter-spacing: -0.01em;
  }
  .logo-vol {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .header-nav {
    display: flex; align-items: center; gap: 4px;
    background: var(--panel); border-radius: 100px; padding: 4px;
    border: 1px solid var(--rule);
    transition: background .25s, border-color .25s;
  }
  .nav-btn {
    padding: 8px 22px; border-radius: 100px; font-size: 13px; font-weight: 500;
    background: transparent; border: none; color: var(--ink-dim);
    cursor: pointer; transition: all .2s; font-family: var(--font);
  }
  .nav-btn.active { background: var(--ink); color: var(--bg); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
    letter-spacing: 0.04em;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--up); flex-shrink: 0;
    animation: livePulse 1.6s ease-out infinite;
  }
  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 rgba(31,122,77,0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(31,122,77,0); }
    100% { box-shadow: 0 0 0 0 rgba(31,122,77,0); }
  }
  html.dark .live-dot { animation: livePulseDark 1.6s ease-out infinite; }
  @keyframes livePulseDark {
    0%   { box-shadow: 0 0 0 0 rgba(95,207,146,0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(95,207,146,0); }
    100% { box-shadow: 0 0 0 0 rgba(95,207,146,0); }
  }
  .icon-btn {
    background: none; border: 1px solid var(--rule-str); color: var(--ink-dim);
    width: 34px; height: 34px; border-radius: 100px; cursor: pointer;
    font-size: 15px; display: grid; place-items: center; transition: all .2s;
  }
  .icon-btn:hover { border-color: var(--warm); color: var(--warm); }

  /* ── TICKER ── */
  .ticker-bar {
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    background: var(--bg); overflow: hidden; position: relative;
    transition: background .25s;
  }
  .ticker-track {
    display: flex; gap: 40px; padding: 14px 0;
    white-space: nowrap;
    animation: tickerScroll 80s linear infinite;
    width: max-content; will-change: transform;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex; align-items: baseline; gap: 8px;
    font-family: var(--mono); font-size: 13px;
  }
  .t-sym { color: var(--ink-dim); letter-spacing: 0.08em; }
  .t-val { color: var(--ink); font-weight: 500; }
  .t-pct { font-weight: 500; }
  .t-pct.up { color: var(--up); }
  .t-pct.dn { color: var(--down); }
  .t-sep { color: var(--ink-soft); font-size: 8px; margin-left: 8px; }

  /* ── MAIN ── */
  main { padding: 0 56px; max-width: 1560px; margin: 0 auto; }

  /* ── HERO ── */
  .hero-section {
    padding: 52px 0 32px;
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 40px;
  }
  .hero-date {
    font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    letter-spacing: 0.18em; margin-bottom: 16px; text-transform: uppercase;
  }
  .hero-headline {
    font-family: var(--serif); font-weight: 400; font-size: 72px;
    line-height: 0.95; color: var(--ink); margin: 0;
    letter-spacing: -0.02em; max-width: 820px;
  }
  .hero-headline em { font-style: italic; color: var(--warm); }
  .hero-stats { display: flex; gap: 32px; padding-bottom: 8px; flex-shrink: 0; }
  .hero-stat { text-align: right; }
  .hero-stat-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px;
  }
  .hero-stat-val {
    font-size: 26px; font-weight: 500; color: var(--ink); letter-spacing: -0.02em;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .section-label {
    font-family: var(--mono); font-size: 11px; color: var(--ink);
    letter-spacing: 0.18em; font-weight: 500; white-space: nowrap;
  }
  .section-rule { flex: 1; height: 1px; background: var(--rule-str); }

  /* ── FILTER BAR ── */
  .filter-row { display: flex; gap: 4px; }
  .filter-btn {
    padding: 6px 14px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.06em; border: 1px solid var(--rule);
    background: var(--panel); color: var(--ink-dim);
    border-radius: 100px; cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .filter-btn:hover:not(.active) { border-color: var(--rule-str); color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .filter-btn.gainers.active { background: var(--up-soft); color: var(--up); border-color: var(--up); }
  .filter-btn.losers.active  { background: var(--down-soft); color: var(--down); border-color: var(--down); }
  .period-sub-filter {
    display: none; gap: 6px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .period-sub-filter.visible { display: flex; }
  .period-sub-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.1em; margin-right: 4px;
  }
  .period-sub-btn {
    padding: 4px 12px; font-family: var(--mono); font-size: 11px;
    border: 1px solid var(--rule); background: none; color: var(--ink-dim);
    border-radius: 100px; cursor: pointer; transition: all .15s;
  }
  .period-sub-btn:hover:not(.active) { border-color: var(--rule-str); color: var(--ink); }
  .gainers-mode .period-sub-btn.active { background: var(--up-soft); color: var(--up); border-color: var(--up); }
  .losers-mode  .period-sub-btn.active { background: var(--down-soft); color: var(--down); border-color: var(--down); }

  /* ── CRYPTO CARDS ── */
  .coins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }
  .coin-card {
    background: var(--panel); border-radius: 4px; border: 1px solid var(--rule);
    padding: 28px; display: flex; flex-direction: column; gap: 20px;
    cursor: pointer; transition: transform .3s, box-shadow .3s;
  }
  .coin-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(26,24,20,0.07);
  }
  html.dark .coin-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.28); }

  .card-top-row { display: flex; align-items: center; justify-content: space-between; }
  .card-coin-left { display: flex; align-items: center; gap: 14px; }
  .coin-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; flex-shrink: 0; }
  .coin-name { font-size: 20px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; line-height: 1.1; }
  .coin-sym {
    font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    letter-spacing: 0.1em; margin-top: 3px;
  }
  .change-badge {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 6px 11px; border-radius: 100px;
    display: flex; align-items: center; gap: 4px; letter-spacing: 0.02em;
  }
  .change-badge.up { background: var(--up-soft); color: var(--up); }
  .change-badge.dn { background: var(--down-soft); color: var(--down); }

  .price-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.14em; margin-bottom: 6px; text-transform: uppercase;
  }
  .price-val {
    font-size: 36px; font-weight: 500; color: var(--ink);
    letter-spacing: -0.02em; line-height: 1;
    animation: priceFlicker 3.2s ease-in-out infinite;
  }
  @keyframes priceFlicker {
    0%, 100% { opacity: 1; }
    48%, 52% { opacity: 0.88; }
  }

  .sparkline-wrap { margin: 0 -4px; overflow: hidden; line-height: 0; }

  .perf-row {
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--rule); padding-top: 14px;
  }
  .perf-cell { text-align: center; }
  .p-label {
    font-family: var(--mono); font-size: 9px; color: var(--ink-soft);
    letter-spacing: 0.1em; margin-bottom: 3px; text-transform: uppercase;
  }
  .p-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .p-val.up { color: var(--up); }
  .p-val.dn { color: var(--down); }

  /* ── WIDGETS ROW ── */
  .widgets-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 40px; }

  /* ── CONVERTER ── */
  .widget-card {
    background: var(--panel); border: 1px solid var(--rule); border-radius: 4px; padding: 28px;
  }
  .wid-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.14em; margin-bottom: 4px; text-transform: uppercase;
  }
  .wid-title { font-size: 20px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .wid-sub   { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-bottom: 20px; }

  .conv-fields { display: flex; gap: 12px; margin-bottom: 16px; }
  .conv-field  { flex: 2; position: relative; }
  .conv-sel-wrap { flex: 1; position: relative; }
  .conv-fl {
    position: absolute; top: 10px; left: 14px; pointer-events: none;
    font-family: var(--mono); font-size: 9px; color: var(--ink-soft);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .conv-input {
    width: 100%; padding: 28px 14px 12px; box-sizing: border-box;
    border: 1px solid var(--rule); border-radius: 4px;
    font-family: var(--mono); font-size: 24px; font-weight: 500;
    color: var(--ink); background: var(--bg); outline: none;
    transition: border-color .2s;
  }
  .conv-input:focus { border-color: var(--rule-str); }
  .conv-select {
    width: 100%; padding: 28px 14px 12px; box-sizing: border-box;
    border: 1px solid var(--rule); border-radius: 4px;
    font-family: var(--font); font-size: 18px; font-weight: 500;
    color: var(--ink); background: var(--bg); outline: none; appearance: none; cursor: pointer;
  }
  .conv-results {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 1px; background: var(--rule);
    border-radius: 4px; overflow: hidden; border: 1px solid var(--rule);
  }
  .conv-result { background: var(--panel); padding: 14px 16px; }
  .conv-res-lbl {
    font-family: var(--mono); font-size: 9px; color: var(--ink-soft);
    letter-spacing: 0.14em; margin-bottom: 4px; text-transform: uppercase;
  }
  .conv-res-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--ink); }
  .conv-res-sub { font-size: 10px; color: var(--ink-soft); margin-top: 2px; }

  /* ── FEAR & GREED ── */
  .fg-gauge-row { display: flex; align-items: center; gap: 24px; margin-top: 4px; }
  .fg-number { font-size: 56px; font-weight: 400; line-height: 1; letter-spacing: -0.03em; }
  .fg-state  { font-size: 15px; font-weight: 500; margin-top: 4px; }
  .fg-desc   { font-size: 13px; color: var(--ink-dim); margin-top: 2px; }
  .fg-scale  {
    margin-top: 18px; display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft); letter-spacing: 0.08em;
  }

  /* ── TOP MOVERS ── */
  .movers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .movers-card {
    background: var(--panel); border: 1px solid var(--rule); border-radius: 4px; padding: 20px;
  }
  .movers-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--rule);
  }
  .movers-title { font-size: 16px; font-weight: 500; color: var(--ink); }
  .movers-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; }
  .movers-badge.up { color: var(--up); }
  .movers-badge.dn { color: var(--down); }
  .mover-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--rule);
  }
  .mover-row:last-child { border-bottom: none; }
  .mover-rank { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); width: 16px; }
  .mover-dot {
    width: 24px; height: 24px; border-radius: 999px;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 8px; font-weight: 700; color: var(--ink); flex-shrink: 0;
  }
  .mover-info { flex: 1; }
  .mover-name  { font-size: 13px; font-weight: 500; color: var(--ink); }
  .mover-price { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); }
  .mover-pct   { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .mover-pct.up { color: var(--up); }
  .mover-pct.dn { color: var(--down); }

  /* ── SKELETONS ── */
  @keyframes shimmer {
    0%   { background-position: -700px 0; }
    100% { background-position:  700px 0; }
  }
  .sk {
    background: linear-gradient(90deg, var(--rule) 25%, var(--panel) 50%, var(--rule) 75%);
    background-size: 1400px 100%; animation: shimmer 1.8s infinite; border-radius: 4px;
  }
  .sk-card {
    background: var(--panel); border: 1px solid var(--rule);
    border-radius: 4px; padding: 28px; display: flex; flex-direction: column; gap: 20px;
  }

  /* ── DETAIL VIEW ── */
  .view-enter { animation: fadeIn .22s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--rule); color: var(--ink-dim);
    padding: 8px 16px; border-radius: 100px; cursor: pointer;
    font-size: 13px; font-family: var(--font); transition: all .15s; margin-bottom: 28px;
  }
  .back-btn:hover { border-color: var(--rule-str); color: var(--ink); }
  .detail-hero {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 20px; margin-bottom: 28px;
  }
  .detail-coin-info { display: flex; align-items: center; gap: 18px; }
  .detail-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: contain; }
  .detail-name {
    font-size: 2rem; font-weight: 500; letter-spacing: -0.02em;
    line-height: 1; margin-bottom: 6px; color: var(--ink);
  }
  .detail-symbol {
    font-family: var(--mono); font-size: 12px; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .detail-price-block { text-align: right; }
  .detail-price {
    font-size: 2.4rem; font-weight: 500; font-family: var(--mono);
    letter-spacing: -0.03em; line-height: 1; margin-bottom: 10px; color: var(--ink);
  }
  .detail-change {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    padding: 6px 12px; border-radius: 100px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .detail-change.up { background: var(--up-soft); color: var(--up); }
  .detail-change.dn { background: var(--down-soft); color: var(--down); }
  .detail-perf-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 1px; background: var(--rule);
    border: 1px solid var(--rule); border-radius: 4px;
    overflow: hidden; margin-bottom: 28px;
  }
  .detail-perf-cell { background: var(--panel); padding: 24px 12px; text-align: center; }
  .detail-perf-cell.up-cell { background: var(--up-soft); }
  .detail-perf-cell.dn-cell { background: var(--down-soft); }
  .detail-perf-label {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px;
  }
  .detail-perf-val { font-size: 1rem; font-weight: 500; font-family: var(--mono); }
  .detail-perf-val.up { color: var(--up); }
  .detail-perf-val.dn { color: var(--down); }
  .chart-card {
    background: var(--panel); border: 1px solid var(--rule);
    border-radius: 4px; padding: 28px; margin-bottom: 20px;
  }
  .chart-card canvas { width: 100%!important; height: 360px!important; }
  .period-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .period-tab {
    padding: 8px 14px; border-radius: 100px;
    background: transparent; border: 1px solid var(--rule);
    color: var(--ink-dim); cursor: pointer; font-size: 11px;
    font-family: var(--mono); font-weight: 500; transition: all .15s; letter-spacing: 0.06em;
  }
  .period-tab.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  .period-tab:hover:not(.active) { border-color: var(--rule-str); color: var(--ink); }
  .log-card {
    background: var(--panel); border: 1px solid var(--rule); border-radius: 4px; padding: 24px;
  }
  .log-card-title {
    font-family: var(--mono); font-size: 10px; color: var(--ink-soft);
    letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 16px;
  }
  .daily-log { display: flex; gap: 8px; flex-wrap: wrap; }
  .day-pill {
    background: var(--bg); border: 1px solid var(--rule); border-radius: 4px;
    padding: 10px 14px; display: flex; flex-direction: column; gap: 4px; min-width: 68px;
  }
  .dp-date { color: var(--ink-soft); font-family: var(--mono); font-size: 10px; }
  .dp-val  { font-weight: 600; font-family: var(--mono); font-size: 12px; }
  .dp-val.up { color: var(--up); }
  .dp-val.dn { color: var(--down); }

  /* ── FOOTER ── */
  .page-footer {
    display: flex; justify-content: space-between; align-items: baseline;
    border-top: 1px solid var(--rule); padding: 24px 0 44px;
  }
  .footer-logo { font-family: var(--serif); font-size: 22px; font-style: italic; color: var(--ink); }
  .footer-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); letter-spacing: 0.14em; }

  /* ── SHARED ── */
  .error-msg {
    background: var(--down-soft); border: 1px solid rgba(178,58,42,0.2);
    color: var(--down); padding: 14px 18px; border-radius: 4px;
    font-size: 13px; margin-bottom: 20px;
  }

/* ══════════════════════════════════════
   SVG SPARKLINE
══════════════════════════════════════ */
function makeSpark(data, w=400, h=60, upColor='#1F7A4D', dnColor='#B23A2A') {
  if (!data || data.length < 2) return '';
  const isUp = data[data.length-1] >= data[0];
  const color = isUp ? upColor : dnColor;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - min) / range) * h * 0.85 - h * 0.075,
  ]);
  let d = `M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i-1], p1 = pts[i];
    const cx = (p0[0] + p1[0]) / 2;
    d += ` C${cx.toFixed(2)},${p0[1].toFixed(2)} ${cx.toFixed(2)},${p1[1].toFixed(2)} ${p1[0].toFixed(2)},${p1[1].toFixed(2)}`;
  }
  const areaD = `${d} L${w},${h} L0,${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
    <path d="${areaD}" fill="${color}" fill-opacity="0.07"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function updateCalc(){
  const amount=parseFloat(document.getElementById('calc-amount')?.value)||0;
  const coinId=document.getElementById('calc-coin')?.value;
  const coin=COINS.find(c=>c.id===coinId); if(!coin) return;
  const ticker=_tickers.find(t=>t.symbol===coin.pair);
  const price=ticker?parseFloat(ticker.lastPrice):0;
  const usd=amount*price;
  const btcTicker=_tickers.find(t=>t.symbol==='BTCUSDT');
  const btcPrice=btcTicker?parseFloat(btcTicker.lastPrice):0;
  const elU=document.getElementById('calc-usd');
  const elA=document.getElementById('calc-ars');
  const elB=document.getElementById('calc-btc');
  if(elU) elU.textContent=usd>0?`$${usd.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`:'—';
  if(elA){
    elA.textContent=(_arsRate&&usd>0)?`$${(usd*_arsRate.venta).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})}`:'—';
  }
  if(elB){
    if(coinId==='bitcoin') elB.textContent=usd>0?`${Math.round(amount*1e8).toLocaleString('es-ES')} sat`:'—';
    else if(btcPrice>0&&usd>0) elB.textContent=`${(usd/btcPrice).toFixed(8)} BTC`;
    else elB.textContent='—';
  }
}

    sub.classList.toggle('visible',type!=='all');

    sub.classList.toggle('losers-mode',type==='losers');
    sub.querySelectorAll('.period-sub-btn').forEach((b,i)=>b.classList.toggle('active',i===_filterPeriodIdx));
  }
  renderCards();
}
function getSortedCoins(){
  const arr=COINS.map(coin=>{
    const ticker=_tickers.find(t=>t.symbol===coin.pair);
    const pct24h=ticker?parseFloat(ticker.priceChangePercent):0;
    const klines=_allKlines[coin.id]||[];
    const sortVal=_filterPeriodIdx===0?pct24h:(calcPct(klines.slice(-PERF_DAYS[_filterPeriodIdx]))??0);
    return{coin,pct24h,sortVal};
  });
  if(_activeFilter==='gainers') return[...arr].sort((a,b)=>b.sortVal-a.sortVal);
  if(_activeFilter==='losers')  return[...arr].sort((a,b)=>a.sortVal-b.sortVal);
  return arr;
}
function setPeriodFilter(idx){
  _filterPeriodIdx=idx;
  document.querySelectorAll('.period-sub-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));

function renderCards(){

    const ticker=_tickers.find(t=>t.symbol===coin.pair); if(!ticker) return;
    const price=parseFloat(ticker.lastPrice);
    const klines=_allKlines[coin.id]||[];
    recordDay(coin.id,price,pct24h);
    const perfs=PERF_DAYS.map((d,i)=>i===0?pct24h:calcPct(klines.slice(-d)));
    const spark=klines.slice(-24).map(kClose);
    const up=pct24h>=0;

async function switchPeriod(coinId,interval,limit,btn){
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const coin=COINS.find(c=>c.id===coinId);
  try{
    const klines=await fetchKlines(coin.pair,interval,limit);
    const labels=klines.map(k=>{
      const d=new Date(kTime(k));
      return(interval==='1h'||interval==='4h')
        ?d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
        :d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});
    });
    const prices=klines.map(kClose);
    const canvas=document.getElementById('detail-chart'); if(!canvas) return;
    const ctx=canvas.getContext('2d');
    if(_detailChart) _detailChart.destroy();
    const dark=document.documentElement.classList.contains('dark');
    const gc=dark?'rgba(250,247,240,0.07)':'rgba(26,24,20,0.07)';
    const tc=dark?'#A39989':'#6B6358';
    const gradient=ctx.createLinearGradient(0,0,0,360);
    gradient.addColorStop(0,coin.color+'44');
    gradient.addColorStop(1,coin.color+'00');
    _detailChart=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{data:prices,borderColor:coin.color,backgroundColor:gradient,borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.3}]},
      options:{
        animation:{duration:300},
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`$${fmt(c.raw)}`}}},
        scales:{
          x:{ticks:{color:tc,maxTicksLimit:10,font:{size:11,family:"'JetBrains Mono'"}},grid:{color:gc}},
          y:{ticks:{color:tc,font:{size:11,family:"'JetBrains Mono'"},callback:v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+fmt(v)},grid:{color:gc}}
        },
        responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',axis:'x',intersect:false},
      }
    });
  }catch(e){console.warn('chart error',e);}
}

function saveStockLog(l){ try{localStorage.setItem(STOCK_STORAGE_KEY,JSON.stringify(l));}catch{} }
function recordStockDay(sym,price,p24){
  const log=loadStockLog(),today=new Date().toISOString().slice(0,10);

  log[sym][today]={price:+price,change:+p24.toFixed(2)};
  saveStockLog(log);
}

  return Object.entries(loadStockLog()[sym]||{}).sort(([a],[b])=>a.localeCompare(b)).slice(-14);

async function yahooFetch(url){
  const enc=encodeURIComponent(url);
  const go=fn=>{try{return fn();}catch{return Promise.reject();}};
  try{
    return await Promise.any([
      // Directo: Yahoo Finance v8 suele responder con CORS *, funciona desde file://
      go(()=>fetch(url,{signal:AbortSignal.timeout(7000),credentials:'omit'}).then(r=>{if(!r.ok)throw 0;return r.json();})),
      go(()=>fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(9000)}).then(r=>{if(!r.ok)throw 0;return r.json();})),
      go(()=>fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(11000)}).then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>JSON.parse(d.contents))),
      go(()=>fetch(`https://api.codetabs.com/v1/proxy?quest=${enc}`,{signal:AbortSignal.timeout(9000)}).then(r=>{if(!r.ok)throw 0;return r.json();})),
      go(()=>fetch(`https://thingproxy.freeboard.io/fetch/${url}`,{signal:AbortSignal.timeout(10000)}).then(r=>{if(!r.ok)throw 0;return r.json();})),
    ]);
  }catch{throw new Error('Yahoo Finance no disponible');}
}
function getStockCurrentData(result){
  if(!result) return{price:0,pct24h:0};
  const closes=getCloses(result);
  const price=result.meta?.regularMarketPrice||(closes[closes.length-1]||0);
  if(closes.length<2) return{price,pct24h:0};
  const last=closes[closes.length-1], prev=closes[closes.length-2];
  const isClosed=Math.abs(price-last)/(last||1)<0.005;
  const pct24h=isClosed?((last-prev)/prev)*100:((price-last)/last)*100;
  return{price,pct24h};
}
async function fetchStockChart(sym,range,interval){
  const key=`${sym}_${range}_${interval}`;
  if(_sKCache[key]) return _sKCache[key];
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=${range}&interval=${interval}`;
  const data=await yahooFetch(url);
  const result=data.chart?.result?.[0]||null;
  _sKCache[key]=result;
  return result;
}
function getCloses(result){
  if(!result) return[];
  return(result.indicators?.quote?.[0]?.close||[]).filter(v=>v!==null);
}
function calcStockPerf(closes,daysAgo){
  if(closes.length<daysAgo+1) return null;
  const start=closes[closes.length-1-daysAgo], end=closes[closes.length-1];
  if(!start||!end) return null;
  return((end-start)/start)*100;
}
function getSortedStocks(){
  const arr=STOCKS.map(stock=>{
    const result=_stockKlines[stock.symbol];
    const{price,pct24h}=getStockCurrentData(result);
    const closes=getCloses(result);
    const sortVal=_stockFilterIdx===0?pct24h:(calcStockPerf(closes,STOCK_PERF_DAYS[_stockFilterIdx])??0);
    return{stock,price,pct24h,sortVal};
  });
  if(_stockFilter==='gainers') return[...arr].sort((a,b)=>b.sortVal-a.sortVal);
  if(_stockFilter==='losers')  return[...arr].sort((a,b)=>a.sortVal-b.sortVal);
  return arr;
}

      <div>
        <div class="price-label">PRECIO USD</div>
        <div class="price-val">$${fmt(price)}</div>
      </div>
      <div class="sparkline-wrap">${makeSpark(spark)}</div>
      <div class="perf-row">${perfCells}</div>`;
    grid.appendChild(card);
  });
  if(rendered===0){
    grid.innerHTML=`<div class="error-msg" style="grid-column:1/-1">⚠ No se pudieron cargar datos de acciones.<br><small>Abrí la página desde un servidor local para que los datos carguen correctamente.</small></div>`;
  }
}
async function renderMercado(){
  _view='mercado';
  document.title='Mercado — Acciones';
  if(_detailChart){_detailChart.destroy();_detailChart=null;}
  if(_stockDetailChart){_stockDetailChart.destroy();_stockDetailChart=null;}

  document.getElementById('app').innerHTML=`
    <div class="section-header">
      <div class="section-label">EN PORTADA</div>
      <div class="section-rule"></div>
      <div class="filter-row">
        <button id="sfilter-all"     class="stock-filter-btn filter-btn${_stockFilter==='all'?' active':''}"             onclick="setStockFilter('all')">Todas</button>
        <button id="sfilter-gainers" class="stock-filter-btn filter-btn gainers${_stockFilter==='gainers'?' active':''}" onclick="setStockFilter('gainers')">▲ Subidas</button>
        <button id="sfilter-losers"  class="stock-filter-btn filter-btn losers${_stockFilter==='losers'?' active':''}"   onclick="setStockFilter('losers')">▼ Caídas</button>
      </div>
    </div>
    <div class="period-sub-filter ${_stockFilter!=='all'?'visible':''} ${_stockFilter==='gainers'?'gainers-mode':''} ${_stockFilter==='losers'?'losers-mode':''}" id="stock-period-sub-filter">
      <span class="period-sub-label">Ordenar por período:</span>
      ${STOCK_PERF_LABELS.map((lb,i)=>`<button class="period-sub-btn${i===_stockFilterIdx?' active':''}" onclick="setStockPeriodFilter(${i})">${lb}</button>`).join('')}
    </div>
    <div class="coins-grid" id="stocks-grid">
      <div class="placeholder"><div class="spinner"></div><span id="stock-load-msg">Cargando datos del mercado…</span></div>
    </div>`;

  if(STOCKS.some(s=>_stockKlines[s.symbol])){renderStockCards();return;}
  const grid=document.getElementById('stocks-grid');
  try{
    const BATCH=4;
    for(let i=0;i<STOCKS.length;i+=BATCH){
      const batch=STOCKS.slice(i,i+BATCH);
      const results=await Promise.all(batch.map(s=>fetchStockChart(s.symbol,'1y','1d').catch(()=>null)));
      batch.forEach((s,j)=>{_stockKlines[s.symbol]=results[j];});
      const done=Math.min(i+BATCH,STOCKS.length);
      const msg=document.getElementById('stock-load-msg');
      if(msg) msg.textContent=`Cargando ${done}/${STOCKS.length} acciones…`;
      if(i+BATCH<STOCKS.length) await new Promise(r=>setTimeout(r,350));
    }
    renderStockCards();
  }catch(e){
    if(grid) grid.innerHTML=`<div class="error-msg" style="grid-column:1/-1">⚠ Error: <b>${e.message}</b></div>`;
  }
}
function showStockDetail(symbol){
  _view='stock-detail';
  const stock=STOCKS.find(s=>s.symbol===symbol);
  const{price,pct24h}=getStockCurrentData(_stockKlines[symbol]);
  const closes=getCloses(_stockKlines[symbol]);
  const perfs=STOCK_PERF_DAYS.map((d,i)=>i===0?pct24h:calcStockPerf(closes,d));
  const log=getStockDailyLog(symbol);
  const up=pct24h>=0;

  const perfCells=STOCK_PERF_LABELS.map((label,i)=>{
    const v=perfs[i];
    const cc=v!=null?(v>=0?' up-cell':' dn-cell'):'';
    return `<div class="detail-perf-cell${cc}">
      <div class="detail-perf-label">${label}</div>
      <div class="detail-perf-val ${v!=null?cls(v):''}">${v!=null?badge(v):'—'}</div>
    </div>`;
  }).join('');

  const pills=log.length
    ?log.map(([date,e])=>`<div class="day-pill"><span class="dp-date">${shortDate(date)}</span><span class="dp-val ${cls(e.change)}">${badge(e.change)}</span></div>`).join('')
    :'<span style="color:var(--ink-soft);font-size:13px">Sin datos guardados aún.</span>';

  const tabsHtml=STOCK_DETAIL_PERIODS.map((p,i)=>
    `<button class="period-tab${i===4?' active':''}" onclick="switchStockPeriod('${symbol}','${p.range}','${p.interval}',this)">${p.label}</button>`
  ).join('');

  document.title=`${stock.name} — Mercado`;
  if(_stockDetailChart){_stockDetailChart.destroy();_stockDetailChart=null;}

  document.getElementById('app').innerHTML=`
    <div class="view-enter">
      <button class="back-btn" onclick="setNavTab('mercado')">← Volver al mercado</button>
      <div class="detail-hero">
        <div class="detail-coin-info">
          <img class="detail-logo" src="${stock.logo}" alt="${stock.name}" onerror="this.style.display='none'">
          <div>
            <div class="detail-name">${stock.name}</div>
            <div class="detail-symbol">${stock.symbol}</div>
          </div>
        </div>
        <div class="detail-price-block">
          <div class="detail-price">$${fmt(price)}</div>
          <div class="detail-change ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(pct24h).toFixed(2)}% hoy</div>
        </div>
      </div>
      <div class="section-header" style="margin-bottom:16px">
        <div class="section-label">RENDIMIENTO POR PERÍODO</div>
        <div class="section-rule"></div>
      </div>
      <div class="detail-perf-grid">${perfCells}</div>
      <div class="chart-card">
        <div class="period-tabs">${tabsHtml}</div>
        <canvas id="stock-detail-chart"></canvas>
      </div>
      <div class="log-card" style="margin-bottom:40px">
        <div class="log-card-title">Rendimiento diario guardado</div>
        <div class="daily-log">${pills}</div>
      </div>
    </div>`;

  window.scrollTo(0,0);
  switchStockPeriod(symbol,'1mo','1d',document.querySelector('.period-tab.active'));
}
async function switchStockPeriod(symbol,range,interval,btn){
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  try{
    const result=await fetchStockChart(symbol,range,interval); if(!result) return;
    const timestamps=result.timestamp||[];
    const closes=result.indicators?.quote?.[0]?.close||[];
    const isIntraday=['5m','15m','30m','60m','1h'].includes(interval);
    const labels=timestamps.map(ts=>{
      const d=new Date(ts*1000);
      return isIntraday
        ?d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
        :d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});
    });
    const stock=STOCKS.find(s=>s.symbol===symbol);
    const canvas=document.getElementById('stock-detail-chart'); if(!canvas) return;
    const ctx=canvas.getContext('2d');
    if(_stockDetailChart) _stockDetailChart.destroy();
    const dark=document.documentElement.classList.contains('dark');
    const gc=dark?'rgba(250,247,240,0.07)':'rgba(26,24,20,0.07)';
    const tc=dark?'#A39989':'#6B6358';
    const gradient=ctx.createLinearGradient(0,0,0,360);
    gradient.addColorStop(0,stock.color+'44');
    gradient.addColorStop(1,stock.color+'00');
    _stockDetailChart=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{data:closes,borderColor:stock.color,backgroundColor:gradient,borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.3}]},
      options:{
        animation:{duration:300},
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`$${fmt(c.raw)}`}}},
        scales:{
          x:{ticks:{color:tc,maxTicksLimit:10,font:{size:11,family:"'JetBrains Mono'"}},grid:{color:gc}},
          y:{ticks:{color:tc,font:{size:11,family:"'JetBrains Mono'"},callback:v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+fmt(v)},grid:{color:gc}}
        },
        responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',axis:'x',intersect:false}
      }
    });
  }catch(e){console.warn('stock chart error',e);}
}

renderSkeletons();
fetchAll();
setInterval(fetchAll,60_000);
</script>
